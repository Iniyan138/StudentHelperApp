<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Genwise Student Helper</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #5b6675;
      --line: #d9e2ec;
      --panel: #ffffff;
      --soft: #f4f7fb;
      --accent: #1769aa;
      --accent-dark: #0f4f82;
      --success: #1f7a4d;
      --shadow: 0 18px 48px rgba(39, 55, 77, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(234, 244, 255, 0.98), rgba(247, 249, 252, 0.98) 48%, rgba(239, 246, 242, 0.98)),
        url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23c9d8e8' stroke-width='1' opacity='0.45'%3E%3Cpath d='M0 40h120M0 80h120M40 0v120M80 0v120'/%3E%3C/g%3E%3C/svg%3E");
    }

    .app {
      width: min(1280px, calc(100% - 28px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px 0;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 16px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 8px 0 2px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .badge {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      font-weight: 800;
      font-size: 18px;
      box-shadow: 0 10px 24px rgba(23, 105, 170, 0.24);
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.35;
    }

    .status {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      border: 1px solid rgba(31, 122, 77, 0.35);
      border-radius: 8px;
      background: white;
      color: var(--success);
      font-weight: 800;
      font-size: 13px;
      white-space: nowrap;
    }

    .tool-tabs,
    .workspace {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .tool-tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
    }

    button,
    a.open-link {
      min-height: 42px;
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 0 12px;
      background: white;
      color: var(--accent-dark);
      font: 800 14px Arial, Helvetica, sans-serif;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    button.active {
      background: var(--accent);
      color: white;
    }

    .workspace {
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      min-height: calc(100vh - 182px);
    }

    .workspace-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfdff;
    }

    .workspace-head strong {
      font-size: 15px;
    }

    .workspace-head span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    iframe {
      width: 100%;
      height: 100%;
      min-height: 720px;
      border: 0;
      background: white;
    }

    @media (max-width: 900px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .tool-tabs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100% - 20px, 760px);
      }

      .tool-tabs {
        grid-template-columns: 1fr;
      }

      .workspace-head {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="badge">GW</div>
        <div>
          <h1>Genwise Student Helper</h1>
          <p class="subtitle">One home for homework help, deadlines, timetable planning, and daily routines.</p>
        </div>
      </div>
      <div class="status">4 tools connected</div>
    </header>

    <nav class="tool-tabs" aria-label="Choose a Genwise tool">
      <button type="button" class="active" data-tool="Homework_Helper_UI.html" data-name="Homework Helper">Homework Helper</button>
      <button type="button" data-tool="Assignment_Exam_Tracker.html" data-name="Assignment and Exam Tracker">Exam & Assignment Tracker</button>
      <button type="button" data-tool="Timetable_Planner.html" data-name="Timetable Planner">Timetable Planner</button>
      <button type="button" data-tool="Daily_Routine_Planner.html" data-name="Daily Routine Planner">Daily Routine Planner</button>
    </nav>

    <main class="workspace">
      <div class="workspace-head">
        <div>
          <strong id="activeName">Homework Helper</strong>
          <span id="activePath">Homework_Helper_UI.html</span>
        </div>
        <a class="open-link" id="openTool" href="Homework_Helper_UI.html" target="_blank" rel="noopener">Open separately</a>
      </div>
      <iframe id="toolFrame" title="Selected Genwise tool" src="Homework_Helper_UI.html"></iframe>
    </main>
  </div>

  <script>
    const frame = document.getElementById("toolFrame");
    const activeName = document.getElementById("activeName");
    const activePath = document.getElementById("activePath");
    const openTool = document.getElementById("openTool");
    const buttons = Array.from(document.querySelectorAll("[data-tool]"));

    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        buttons.forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        frame.src = button.dataset.tool;
        activeName.textContent = button.dataset.name;
        activePath.textContent = button.dataset.tool;
        openTool.href = button.dataset.tool;
      });
    });
  </script>
</body>
</html>
