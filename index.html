<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=Genwise_Main_UI.html">
  <title>Student Helper App: Scholarly</title>
  <style>
    :root {
      --ink: #17202a;
      --muted: #5b6675;
      --line: #d9e2ec;
      --panel: #ffffff;
      --accent: #1769aa;
      --shadow: 0 18px 48px rgba(39, 55, 77, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(234, 244, 255, 0.98), rgba(247, 249, 252, 0.98) 48%, rgba(239, 246, 242, 0.98)),
        url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23c9d8e8' stroke-width='1' opacity='0.45'%3E%3Cpath d='M0 40h120M0 80h120M40 0v120M80 0v120'/%3E%3C/g%3E%3C/svg%3E");
    }

    main {
      width: min(520px, calc(100% - 28px));
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.1;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.5;
    }

    a {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Student Helper App: Scholarly</h1>
    <p>Opening the dashboard...</p>
    <a href="Genwise_Main_UI.html">Open Dashboard</a>
  </main>
  <script>
    window.location.replace("Genwise_Main_UI.html");
  </script>
</body>
</html>
